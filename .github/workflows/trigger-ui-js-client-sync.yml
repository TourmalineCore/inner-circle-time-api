name: Trigger UI JS-client sync

on:
  workflow_call:
    inputs:
      npm-package-version:
        required: true
        type: string
      
jobs:
  trigger-env:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 
        uses: actions/checkout@v3
        
      - name: Trigger sync-js-client-version in time-ui
        # NOTE: quotes for commit_message not needed because toJson writes quotes automatically 
        run: |
          curl -X POST https://api.github.com/repos/SaraevaAnastasia/inner-circle-time-ui/dispatches \
          -H "Accept: application/vnd.github.everest-preview+json" \
          -u ${{ secrets.INNER_CIRCLE_TIME_UI_TRIGGER_TOKEN  }} \
          -d '{
          "event_type": "latest-api-js-client-version",
           "client_payload": {
              "client-version": "${{ inputs.npm-package-version }}",
              "commit_message": ${{ toJson(github.event.head_commit.message) }}
            }}'
